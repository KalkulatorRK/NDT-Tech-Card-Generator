<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <style>
    line, polyline, path { stroke:#2c3e50; stroke-width:1.5; fill:none; }
    .weld { fill:#a0c4e8; stroke:#2c3e50; stroke-width:1; }
    .dim { stroke:#888; stroke-width:0.8; stroke-dasharray:3,2; fill:none; }
    text { font-family:Arial,sans-serif; font-size:9px; fill:#333; }
    .label { font-size:8px; fill:#555; }
  </style>
  
  <!-- Детали -->
  <polyline points="10,60 90,60 10,60 10,10 90,10" />
  <polyline points="110,60 190,60 190,10 110,10" />
  <!-- Верхний шов -->
  <polygon class="weld" points="90,10 110,10 113,4 87,4" />
  <!-- Нижний шов -->
  <polygon class="weld" points="90,60 110,60 113,68 87,68" />
  <!-- Кромки -->
  <line x1="90" y1="10" x2="100" y2="30" />
  <line x1="110" y1="10" x2="100" y2="30" />
  <line x1="90" y1="60" x2="100" y2="40" />
  <line x1="110" y1="60" x2="100" y2="40" />
  <!-- Полоса металла -->
  <rect class="weld" x="95" y="30" width="10" height="10" />
  <text x="100" y="108" text-anchor="middle" font-weight="bold">С (X-образная)</text>
  <text x="100" y="118" text-anchor="middle" class="label">Способы 10, 11</text>

</svg>