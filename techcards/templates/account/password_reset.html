{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-header"><i class="bi bi-key me-2"></i>Восстановление пароля</div>
        <div class="card-body p-4">
          <p class="text-muted small mb-3">Введите адрес электронной почты — мы отправим ссылку для сброса пароля.</p>
          <form method="post" novalidate>
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100 mt-3">Отправить письмо</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
