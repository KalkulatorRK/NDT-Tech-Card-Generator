<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <style>
    line, polyline, path { stroke:#2c3e50; stroke-width:1.5; fill:none; }
    .weld { fill:#a0c4e8; stroke:#2c3e50; stroke-width:1; }
    .dim { stroke:#888; stroke-width:0.8; stroke-dasharray:3,2; fill:none; }
    text { font-family:Arial,sans-serif; font-size:9px; fill:#333; }
    .label { font-size:8px; fill:#555; }
  </style>
  
  <!-- Горизонтальная деталь -->
  <polyline points="10,80 190,80 190,100 10,100" />
  <!-- Вертикальная деталь -->
  <polyline points="80,10 100,10 100,80" />
  <!-- Шов угловой -->
  <polygon class="weld" points="100,80 80,80 100,55" />
  <!-- Размерная линия (катет) -->
  <line class="dim" x1="80" y1="80" x2="80" y2="55" />
  <line class="dim" x1="80" y1="55" x2="100" y2="55" />
  <text x="72" y="70" class="label">К</text>
  <text x="100" y="108" text-anchor="middle" font-weight="bold">У (Угловое)</text>
  <text x="100" y="118" text-anchor="middle" class="label">Способы 11, 30, 31</text>

</svg>