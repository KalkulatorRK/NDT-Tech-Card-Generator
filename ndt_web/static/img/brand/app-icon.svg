    <path d="M30 30h24a4 4 0 0 1 4 4v30a4 4 0 0 1-4 4H30a4 4 0 0 1-4-4V34a4 4 0 0 1 4-4z" fill="url(#app-doc)" opacity="0.95"/>
    <path d="M50 30v8a3 3 0 0 0 3 3h7" stroke="#8EC5FF" stroke-width="1.5" fill="none" opacity="0.85"/>
    <rect x="32" y="42" width="18" height="3" rx="1.5" fill="#5AA8FF" opacity="0.55"/>
    <rect x="32" y="49" width="24" height="3" rx="1.5" fill="#5AA8FF" opacity="0.4"/>
    <rect x="32" y="56" width="20" height="3" rx="1.5" fill="#5AA8FF" opacity="0.3"/>
    <circle cx="58" cy="58" r="10" fill="#2F8FFF"/>
    <path d="M54 58l3 3 6-7" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
