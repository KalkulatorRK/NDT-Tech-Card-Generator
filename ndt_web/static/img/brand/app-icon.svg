      <stop offset="55%" stop-color="#0B1730"/>
      <stop offset="100%" stop-color="#060D1C"/>
    </linearGradient>
    <linearGradient id="film" x1="96" y1="120" x2="416" y2="360" gradientUnits="userSpaceOnUse">
