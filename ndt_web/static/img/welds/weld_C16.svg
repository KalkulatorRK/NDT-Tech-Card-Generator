<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <style>
    line, polyline, path { stroke:#2c3e50; stroke-width:1.5; fill:none; }
    .weld { fill:#a0c4e8; stroke:#2c3e50; stroke-width:1; }
    .dim { stroke:#888; stroke-width:0.8; stroke-dasharray:3,2; fill:none; }
    text { font-family:Arial,sans-serif; font-size:9px; fill:#333; }
    .label { font-size:8px; fill:#555; }
  </style>
  
  <!-- Деталь 1 -->
  <polyline points="10,35 88,35 88,90 10,90" />
  <!-- Деталь 2 -->
  <polyline points="112,35 190,35 190,90 112,90" />
  <!-- Скосы кромок -->
  <line x1="88" y1="35" x2="100" y2="55" />
  <line x1="112" y1="35" x2="100" y2="55" />
  <!-- Шов -->
  <polygon class="weld" points="88,35 112,35 115,26 85,26" />
  <!-- Корень шва -->
  <polygon class="weld" points="95,55 105,55 100,63" />
  <!-- Размерные линии -->
  <line class="dim" x1="85" y1="26" x2="85" y2="14" />
  <line class="dim" x1="115" y1="26" x2="115" y2="14" />
  <line class="dim" x1="85" y1="18" x2="115" y2="18" />
  <text x="100" y="13" text-anchor="middle">e</text>
  <!-- Метки -->
  <text x="100" y="108" text-anchor="middle" font-weight="bold">С (V-образная)</text>
  <text x="100" y="118" text-anchor="middle" class="label">Способы 40, 52, 30, 31</text>

</svg>