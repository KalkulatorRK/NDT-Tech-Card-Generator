<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="Карта-НК">
  <defs>
    <linearGradient id="base-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563b8"/>
      <stop offset="100%" stop-color="#3a7bd5"/>
    </linearGradient>
    <linearGradient id="base-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a7bd5"/>
      <stop offset="100%" stop-color="#6ea3e8"/>
    </linearGradient>
    <linearGradient id="top-sheet" x1="0" y1="-70" x2="0" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="35%" stop-color="#F3FBF9"/>
      <stop offset="100%" stop-color="#9FE0D6"/>
    </linearGradient>
  </defs>
  <g transform="translate(256 262)">
    <!-- синее основание (как в эскизе) -->
    <path d="M-98 72 L-98 132 L0 182 L0 122 Z" fill="url(#base-left)" stroke="#1e4d8f" stroke-width="3" stroke-linejoin="round"/>
    <path d="M98 72 L98 132 L0 182 L0 122 Z" fill="url(#base-right)" stroke="#1e4d8f" stroke-width="3" stroke-linejoin="round"/>
    <!-- верхний ромб-лист -->
    <path d="M0 -70 L98 -10 L0 50 L-98 -10 Z" fill="url(#top-sheet)" stroke="#2d2d2d" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- треугольник-контур -->
    <path d="M0 -54 L-46 6 L46 6 Z" fill="none" stroke="#1a7a6f" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
</svg>
