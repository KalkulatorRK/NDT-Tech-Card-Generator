# Конфигурация для Railway (Nixpacks)
[phases.setup]
nixPkgs = ["python312", "postgresql"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
    "python manage.py collectstatic --noinput",
    "python manage.py migrate",
    "python manage.py init_data",
    "python manage.py ingest_gost_50_05_09 || true",
]

[start]
cmd = "gunicorn ndt_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
