<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <style>
    line, polyline, path { stroke:#2c3e50; stroke-width:1.5; fill:none; }
    .weld { fill:#a0c4e8; stroke:#2c3e50; stroke-width:1; }
    .dim { stroke:#888; stroke-width:0.8; stroke-dasharray:3,2; fill:none; }
    text { font-family:Arial,sans-serif; font-size:9px; fill:#333; }
    .label { font-size:8px; fill:#555; }
  </style>
  
  <!-- Деталь 1 (левая) -->
  <polyline points="10,30 90,30 90,90 10,90" />
  <!-- Деталь 2 (правая) -->
  <polyline points="110,30 190,30 190,90 110,90" />
  <!-- Шов (трапеция усиления) -->
  <polygon class="weld" points="90,30 110,30 113,22 87,22" />
  <!-- Размерная линия ширины шва e -->
  <line class="dim" x1="87" y1="22" x2="87" y2="12" />
  <line class="dim" x1="113" y1="22" x2="113" y2="12" />
  <line class="dim" x1="87" y1="15" x2="113" y2="15" />
  <text x="100" y="11" text-anchor="middle">e</text>
  <!-- Размерная линия усиления g -->
  <line class="dim" x1="115" y1="22" x2="125" y2="22" />
  <line class="dim" x1="115" y1="30" x2="125" y2="30" />
  <line class="dim" x1="122" y1="22" x2="122" y2="30" />
  <text x="127" y="27" class="label">g</text>
  <!-- Подписи -->
  <text x="100" y="108" text-anchor="middle" font-weight="bold">С-1</text>
  <text x="100" y="118" text-anchor="middle" class="label">Без разделки</text>

</svg>