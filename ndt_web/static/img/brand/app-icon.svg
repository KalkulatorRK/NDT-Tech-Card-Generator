      <stop offset="100%" stop-color="#7FA6D4" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="pipe" x1="156" y1="156" x2="356" y2="356" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F4F8FF"/>
      <stop offset="45%" stop-color="#B7CCE8"/>
