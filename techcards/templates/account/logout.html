{% extends "base.html" %}

{% block title %}Выход{% endblock %}

{% block content %}
<div class="container py-5 text-center">
  <i class="bi bi-box-arrow-right fs-1 text-muted mb-3 d-block"></i>
  <h2 class="fw-bold">Выход из системы</h2>
  <p class="text-muted mb-4">Вы уверены, что хотите выйти?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-primary me-2">
      <i class="bi bi-check me-1"></i>Да, выйти
    </button>
    <a href="{% url 'core:home' %}" class="btn btn-outline-secondary">Отмена</a>
  </form>
</div>
{% endblock %}
